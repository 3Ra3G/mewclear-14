# C-27 Humanoid Robot — department + job + playtime tracker. #Misfits Add (Phase G)
# Mirrors the Synthetics/SuperMutant whitelist-only species-job pattern: one department
# ("C-27 Autonomous Unit") containing one job (C27), locked behind admin job whitelist
# and CharacterSpeciesRequirement so only whitelisted players who selected the C27
# species in the character editor can take the role. Registers PlayerRobot faction so
# C-27 units share alliance rules with existing player robots / SentryBots / HostileRobots.
# Cosmetic faction skin (NCR / BoS / Generic) is selected via the Phase C marking, not
# via separate jobs.

- type: department
  id: C27Unit
  description: department-C27Unit-description
  color: "#8a96a3" # light brushed-steel grey, distinct from Robots (#607d8b)
  # #Misfits Tweak - lowered weight from -100 to -102 so the lobby UI sorts
  # Robots/FEVMutants (-100) and Enclave (-101) between CaesarLegion (-99) and
  # C27Unit, matching the visual margin/spacing of the other special departments.
  weight: -102
  roles:
  - C27

- type: job
  id: C27
  name: job-name-c27
  description: job-description-c27
  playTimeTracker: C27
  icon: JobIconBorg
  supervisors: job-supervisors-c27
  canBeAntag: false
  setPreference: true
  overrideConsoleVisibility: true
  whitelisted: true # admin job whitelist required (jobwhitelistadd <player> C27)
  hideWithoutWhitelist: true
  jobWhitelistBypassesRoleTimers: true
  spawnLoadout: true # #Misfits Tweak (Phase H revised) - loadout tab re-enabled via allowedLoadoutCategories on species;
  # armor is delivered via UndecidedLoadoutBackpack kit in startingGear (pocket1), loadout for other gear categories
  applyTraits: true # allow trait/perk picks like SuperMutant
  startingGear: C27Gear
  requirements:
  - !type:CharacterSpeciesRequirement
    species:
    - C27     # Generic model
    - C27NCR  # #Misfits Add - NCR model variant shares this job
    - C27BoS  # #Misfits Add - Brotherhood model variant shares this job
  special:
  - !type:AddComponentSpecial
    components:
      - type: NpcFactionMember
        factions:
          - PlayerRobot

# Starting gear: chassis jumpsuit always applied; faction kit + headset/tag selected via subGear.
# subGear entries are matched by the player's chosen C-27 species variant at spawn time:
#   C27 (Generic / Unassigned) → no armor kit, no faction tag/headset (chassis jumpsuit only)
#   C27NCR                     → pocket1: C27NCRLoadoutKit  + ears: NCR headset + id: NCR dogtag
#   C27BoS                     → pocket1: C27BoSLoadoutKit  + ears: BoS headset + id: BoS holotag
# The faction kits open an UndecidedLoadoutBackpack UI that now offers Light only.
# Medium / Heavy variants are obtained by crafting at an armor workbench using the
# C-27 Armor Blueprint (NCR / BoS / Generic) — see blueprint_recipes_c27.yml.
- type: startingGear
  id: C27Gear
  equipment:
    jumpsuit: ClothingC27Chassis
  subGear: # #Misfits Tweak - per-faction kit + faction-tag/headset delivery via species-conditional sub-gears
  - C27GearNCRKit
  - C27GearBoSKit
  # Generic species ('Unassigned') intentionally has no sub-gear entry; jumpsuit only.

# Sub-gear: NCR variant — Light NCR armor kit, NCR headset, NCR soldier dogtag.
- type: startingGear
  id: C27GearNCRKit
  requirements:
  - !type:CharacterSpeciesRequirement
    species:
    - C27NCR
  equipment:
    pocket1: C27NCRLoadoutKit
    ears: N14ClothingHeadsetNCR # #Misfits Add - NCR radio earpiece on faction-aligned C-27
    id: N14IDNCRDogtagSoldier   # #Misfits Add - NCR soldier dogtag marks faction allegiance

# Sub-gear: Brotherhood of Steel variant — Light BoS armor kit, BoS headset, BoS Initiate holotag.
- type: startingGear
  id: C27GearBoSKit
  requirements:
  - !type:CharacterSpeciesRequirement
    species:
    - C27BoS
  equipment:
    pocket1: C27BoSLoadoutKit
    ears: N14ClothingHeadsetBrotherhoodOfSteel       # #Misfits Add - BoS radio earpiece on faction-aligned C-27
    id: N14IDBrotherhoodOfSteelHolotagInitiate       # #Misfits Add - BoS Initiate holotag marks faction allegiance

- type: playTimeTracker
  id: C27
